<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHAK Health Information Bridge (CHIB)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        background: linear-gradient(180deg, #f8fcff 0%, #f2f8ff 100%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(12px);
        border: 1px solid #d7e8fb;
        box-shadow: 0 12px 32px rgba(9, 84, 160, 0.06);
      }
      .flat-filter {
        border-radius: 8px;
        border: 1px solid #d7e8fb;
        background: #ffffff;
        padding: 8px 10px;
        font-size: 0.9rem;
        color: #0f172a;
      }
      .compact-filter {
        width: 100%;
        max-width: 240px;
      }
      .flat-filter:focus {
        outline: 2px solid rgba(14, 165, 233, 0.14);
      }
      .fab-pulse {
        box-shadow: 0 14px 32px rgba(10, 102, 194, 0.25);
      }
      .typing-dots span {
        animation: pulse 1.2s infinite ease-in-out;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes pulse {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        40% {
          transform: translateY(-3px);
          opacity: 1;
        }
      }
      .fade-in-up {
        animation: fadeInUp 0.55s ease both;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="font-sans text-slate-900 antialiased">
    <div class="min-h-screen">
      <header class="border-b border-slate-200 bg-white">
        <div
          class="h-1 bg-gradient-to-r from-sky-500 via-blue-500 to-sky-300"
        ></div>
        <div class="flex items-center justify-between px-4 sm:px-6 lg:px-8 py-2">
          <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-9 h-9 rounded-full bg-gradient-to-br from-sky-500 to-blue-600 text-white text-sm font-bold shadow-sm">
              CH
            </div>
            <div>
              <div class="text-sm font-bold text-slate-900 leading-tight">CHAK Health Information Bridge</div>
              <div class="text-[11px] font-medium text-slate-400 tracking-wider uppercase">CHIB</div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-200 transition cursor-pointer" title="Profile">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
          </div>
        </div>
      </header>

      <!-- Global tabs bar, sub-tabs bar, filters — horizontal layout, full width -->
      <style>
        #pageTabs { display: flex; align-items: center; gap: 4px; overflow-x: auto; white-space: nowrap; padding: 6px 0; }
        #pageTabs .nav-item { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; cursor: pointer; border-radius: 8px; font-size: 13px; font-weight: 600; letter-spacing: -0.01em; transition: background 0.2s ease, color 0.2s ease; border-bottom: 3px solid transparent; }
        #pageTabs .nav-item:hover { background: #f0f7ff; color: #0b63a5; }
        #pageTabs .nav-item.active { background: #e8f4ff; color: #0a66c2; border-bottom-color: #0ea5e9; }
        #pageContextBar { backdrop-filter: blur(10px); }
        #topFilters { backdrop-filter: blur(10px); }
        #advancedFiltersDrawer { background: #f8fcff; border: 1px solid #d7e8fb; border-radius: 12px; }
        #globalTabsBar { position: sticky; top: 0; z-index: 30; }
      </style>

      <div id="globalTabsBar" class="w-full border-b border-slate-200 bg-white shadow-sm">
        <div class="w-full px-4 sm:px-6 lg:px-8">
          <div id="pageTabs"></div>
        </div>
      </div>

      <!-- Page context strip: breadcrumb + sub links -->
      <div
        id="pageContextBar"
        class="w-full border-b border-slate-200 bg-white/90 hidden"
      >
        <div class="w-full px-4 py-1.5 sm:px-6 lg:px-8">
          <div id="pageBreadcrumb" class="text-sm text-slate-600"></div>
          <div id="pageSublinks" class="mt-1.5 flex flex-wrap gap-1.5"></div>
        </div>
      </div>

      <!-- Top filter bar (full width): primary filters + advanced drawer -->
      <div id="topFilters" class="bg-white" style="border: 1px solid #d7e8fb; border-radius: 10px; margin: 4px 16px;">
        <div class="w-full px-4 py-1.5 sm:px-6 lg:px-8">
          <div class="flex items-center gap-2 flex-wrap">
            <select id="countyFilter" class="flat-filter" style="max-width:180px;"></select>
            <select id="subCountyFilter" class="flat-filter" style="max-width:180px;"></select>
            <select id="facilityFilter" class="flat-filter" style="max-width:180px;"></select>
            <div id="periodSelector" class="flat-filter" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:4px 10px;user-select:none;position:relative;">
              <span id="periodLabel" style="font-size:13px;font-weight:500;white-space:nowrap;color:#64748b;">Period</span>
              <input type="hidden" id="periodFilter" />
            </div>
            <input
              id="chartSearch"
              class="flat-filter flex-1 min-w-[180px]"
              placeholder="Search charts..."
            />
            <button
              id="resetFilters"
              class="rounded px-3 py-2 border border-slate-200 bg-slate-50 text-sm font-semibold"
            >
              Reset
            </button>
          </div>
        </div>
      </div>

      <main class="w-full px-6 py-8 sm:px-8 lg:px-10">
        <section class="space-y-6">
          <article class="glass-card rounded-3xl p-5 sm:p-6 fade-in-up min-h-[300px]">
            <div id="chart"></div>
          </article>
        </section>
      </main>

    <button
      id="aiFab"
      class="fab-pulse fixed bottom-6 right-6 z-40 rounded-full bg-sky-600 px-5 py-4 text-sm font-semibold text-white transition hover:bg-sky-500 focus:outline-none focus:ring-4 focus:ring-sky-200/70"
    >
      ✨ AI Assist
    </button>

    <div
      id="chatOverlay"
      class="fixed inset-0 z-50 hidden bg-slate-900/25 backdrop-blur-[2px]"
    ></div>

    <section
      id="chatModal"
      class="fixed bottom-6 right-6 z-50 hidden w-[calc(100vw-3rem)] max-w-md overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-[0_20px_50px_rgba(15,23,42,0.12)]"
    >
      <header
        class="flex items-center justify-between border-b border-slate-200 bg-sky-50 px-5 py-4 text-slate-900"
      >
        <div>
          <p class="text-xs uppercase tracking-[0.3em] text-sky-700">
            AI Assist
          </p>
          <h3 class="mt-1 text-lg font-semibold">
            Text-to-SQL Executive Copilot
          </h3>
        </div>
        <button
          id="closeChat"
          class="rounded-full border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
        >
          Close
        </button>
      </header>

      <div
        id="chatMessages"
        class="max-h-[26rem] space-y-4 overflow-y-auto px-5 py-4"
      >
        <div class="rounded-2xl bg-sky-50 px-4 py-3 text-sm text-slate-700">
          Ask about clinic spend, total visits, top outliers, or efficiency
          trends.
        </div>
      </div>

      <form id="chatForm" class="border-t border-slate-200 p-4">
        <div class="flex items-end gap-3">
          <textarea
            id="chatInput"
            rows="2"
            placeholder="Which 3 clinics have the highest expenditure?"
            class="min-h-[52px] flex-1 resize-none rounded-2xl border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
          ></textarea>
          <button
            type="submit"
            class="rounded-2xl bg-sky-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-sky-500"
          >
            Send
          </button>
        </div>
      </form>
    </section>

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
